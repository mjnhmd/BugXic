<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XONIX - Territory Capture</title>
    <script src="https://cdn.jsdelivr.net/npm/polybooljs@1.2.2/dist/polybool.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #2c1810;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            font-family: 'Rajdhani', sans-serif;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            height: 100vh;
            gap: 8px;
            padding: 8px 0 12px;
        }

        #game-info {
            display: flex;
            gap: 0;
            padding: 0;
            background: linear-gradient(135deg, #5a4131 0%, #6b4e3a 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid #8b6914;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255,239,213,0.3), 0 2px 8px rgba(0,0,0,0.5);
        }

        #game-info .stat {
            display: flex; align-items: center; gap: 5px;
            padding: 7px 14px;
            position: relative;
        }

        #game-info .stat:not(:last-child)::after {
            content: '';
            position: absolute; right: 0; top: 20%; height: 60%;
            width: 1px;
            background: rgba(139, 105, 20, 0.4);
        }

        #game-info .label {
            color: rgba(253, 246, 227, 0.5);
            font-size: 10px; font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        #game-info .value {
            color: #ffe066;
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px; font-weight: 700;
            min-width: 16px; text-align: center;
        }

        #game-info .lives .value { color: #c0392b; }
        #game-info .progress .value { color: #5a8f3c; }

        #canvas-wrapper {
            position: relative;
            border-radius: 4px;
            flex: 1;
            min-height: 0;
            width: 100%;
            display: flex;
            align-items: stretch;
            justify-content: center;
            padding: 4px 12px;
        }

        #game-canvas {
            display: block;
            border: 4px solid #8b6914;
            border-radius: 3px;
            box-shadow: 
                0 0 0 2px #5a4131,
                inset 0 2px 4px rgba(0,0,0,0.3), 
                0 4px 12px rgba(0,0,0,0.6);
            max-width: 100%;
            max-height: 100%;
        }

        #control-hints {
            font-size: 11px;
            color: rgba(253, 246, 227, 0.35);
            text-align: center;
            font-weight: 500;
            letter-spacing: 0.3px;
            padding-bottom: 4px;
        }

        #control-hints .key {
            display: inline-block;
            padding: 1px 5px;
            background: rgba(139, 105, 20, 0.2);
            border: 1px solid rgba(139, 105, 20, 0.4);
            border-radius: 3px;
            margin: 0 1px;
            color: rgba(255, 224, 102, 0.6);
            font-family: 'Rajdhani', sans-serif;
            font-size: 8px; font-weight: 500;
        }

        @media (max-width: 600px) {
            #game-info .stat { padding: 5px 8px; }
            #game-info .value { font-size: 12px; }
            #game-info .label { font-size: 8px; }
            #control-hints { display: none; }
            #canvas-wrapper { padding: 4px 8px; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="game-info">
            <div class="stat lives">
                <span class="label">Life</span>
                <span class="value" id="lives">3</span>
            </div>
            <div class="stat level">
                <span class="label">Lv</span>
                <span class="value" id="level">1</span>
            </div>
            <div class="stat progress">
                <span class="label">Area</span>
                <span class="value" id="progress">0</span><span class="label" style="letter-spacing:0">%</span>
            </div>
            <div class="stat score">
                <span class="label">Score</span>
                <span class="value" id="score">0</span>
            </div>
        </div>
        <div id="canvas-wrapper">
            <canvas id="game-canvas"></canvas>
        </div>
        <div id="control-hints">
            <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span>
            move
            <span class="key">SPC</span> stop
            <span class="key">ESC</span> pause
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
